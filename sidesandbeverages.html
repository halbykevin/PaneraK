<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panera</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo-container">
        <img src="image/logo/Panera.png" alt="Panera Logo" />
      </div>
      <div class="language-switcher">
        <span class="label en">EN</span>
        <label class="switch">
          <input type="checkbox" id="lang-toggle" />
          <span class="slider round"></span>
        </label>
        <span class="label ar">AR</span>
      </div>
    </header>
    <main class="menu-container-any">
      <a href="index.html" class="back-button" data-i18n="buttons.back">&larr; Back</a>
      <h1 class="menu-title-any">Sides and beverages</h1>
    </main>
    <footer>
      <div class="footer-text">
        <p><b data-i18n="footer.address">Address:</b></p>
        <p><i data-i18n="footer.location">Kferdlaqos, Zgharta</i></p>
        <p><b data-i18n="footer.tel">Tel:</b></p>
        <p><i data-i18n="footer.phone1">06 667 997</i></p>
        <p><i data-i18n="footer.phone2">70 551 751</i></p>
      </div>
      <div class="footer-logo">
        <img src="image/logo/Panera.png" alt="Panera Logo" />
      </div>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
